<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <style>
      .label{font: 16px Arial, sans-serif; fill:#111}
      .small{font: 13px Arial, sans-serif; fill:#111}
      .roadMain{fill:#2f6fed}
      .roadLocal{fill:#9aa3ad}
      .roadService{fill:#23a455}
      .block{fill:#d9d9d9; stroke:#bdbdbd; stroke-width:2}
      .facility{fill:#e74c3c; stroke:#b93b2f; stroke-width:2}
      .outline{fill:none; stroke:#333; stroke-width:2}
    </style>
  </defs>

  <!-- Main arterial -->
  <rect x="40" y="50" width="820" height="60" class="roadMain"/>
  <text x="50" y="40" class="label">HOVEDGATE (arterie, 4 felt)</text>

  <!-- Few connectors from main to local -->
  <rect x="140" y="110" width="26" height="110" class="roadLocal"/>
  <rect x="430" y="110" width="26" height="110" class="roadLocal"/>
  <rect x="720" y="110" width="26" height="110" class="roadLocal"/>
  <text x="50" y="140" class="small">Få koblinger (reduserer gjennomkjøring)</text>

  <!-- Local road segment (front street of blocks) -->
  <rect x="80" y="220" width="760" height="26" class="roadLocal"/>
  <text x="50" y="215" class="label">LOKALVEI (front)</text>

  <!-- Blocks -->
  <rect x="80" y="255" width="240" height="140" class="block"/>
  <rect x="340" y="255" width="240" height="140" class="block"/>
  <rect x="600" y="255" width="240" height="140" class="block"/>
  <text x="120" y="330" class="small">Kvartal</text>
  <text x="380" y="330" class="small">Kvartal</text>
  <text x="640" y="330" class="small">Kvartal</text>

  <!-- Service road behind blocks -->
  <rect x="80" y="405" width="760" height="24" class="roadService"/>
  <text x="50" y="445" class="label">SERVICEGATE (smal lokalvei, 2 felt)</text>

  <!-- Facilities on service road -->
  <rect x="120" y="440" width="150" height="55" class="facility"/>
  <rect x="375" y="440" width="150" height="55" class="facility"/>
  <rect x="630" y="440" width="170" height="55" class="facility"/>
  <text x="155" y="472" class="small" fill="#fff">BRANN</text>
  <text x="418" y="472" class="small" fill="#fff">POLITI</text>
  <text x="660" y="472" class="small" fill="#fff">SYKEHUS</text>

  <!-- Driveway markers -->
  <line x1="195" y1="405" x2="195" y2="440" stroke="#333" stroke-width="2"/>
  <line x1="450" y1="405" x2="450" y2="440" stroke="#333" stroke-width="2"/>
  <line x1="715" y1="405" x2="715" y2="440" stroke="#333" stroke-width="2"/>

  <!-- Legend -->
  <rect x="40" y="470" width="18" height="12" class="roadMain"/><text x="65" y="480" class="small">Hovedgate</text>
  <rect x="160" y="470" width="18" height="12" class="roadLocal"/><text x="185" y="480" class="small">Lokalvei</text>
  <rect x="260" y="470" width="18" height="12" class="roadService"/><text x="285" y="480" class="small">Servicegate</text>
  <rect x="390" y="468" width="18" height="16" class="facility"/><text x="415" y="480" class="small">Tjenestebygg</text>

</svg>
